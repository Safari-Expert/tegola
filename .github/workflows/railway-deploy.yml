name: Deploy Tegola to Railway

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["On push"]
    types: [completed]

jobs:
  deploy:
    name: Deploy Tegola
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-22.04
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_TEGOLA_SERVICE_ID }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'development' }}

    steps:
      - name: Check Railway secrets
        id: railway_secrets
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ] || [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "::notice::Skipping Railway deploy because Railway secrets are not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Check out code
        if: steps.railway_secrets.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node
        if: steps.railway_secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        if: steps.railway_secrets.outputs.configured == 'true'
        run: npm install -g @railway/cli

      - name: Deploy Tegola service
        if: steps.railway_secrets.outputs.configured == 'true'
        run: |
          railway up \
            --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE_ID"
